<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline · Stacker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--dark:#1b1c1c;--surface:#faf7f4;--muted:#6b5550;--border:rgba(226,190,188,0.45);--red:#b52330;--red2:#ff5a5f;--green:#006c4c;--gold:#c9a84c}
html,body{min-height:100%;background:var(--surface);color:var(--dark);font-family:'Inter',sans-serif}
.fi{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;font-family:'Material Symbols Outlined'}
.nav{position:sticky;top:0;z-index:100;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,247,244,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Plus Jakarta Sans';font-weight:900;font-size:17px;color:var(--dark);letter-spacing:-0.03em;display:flex;align-items:center;gap:3px;text-decoration:none}
.nav-logo-dot{width:5px;height:5px;background:var(--red);border-radius:50%;margin-bottom:3px}
.nav-back{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none}
.wrap{max-width:680px;margin:0 auto;padding:24px 20px 100px}
.eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.eyebrow::before{content:'';width:18px;height:1px;background:var(--gold)}
.eyebrow span{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold)}
h1{font-family:'Plus Jakarta Sans';font-weight:900;font-size:28px;letter-spacing:-0.04em;color:var(--dark);margin-bottom:4px}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:24px}

/* STATUS TABS */
.status-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.status-tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all 0.2s}
.tab.active{background:var(--dark);border-color:var(--dark);color:#fff}
.tab-count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:800;margin-left:4px}
.tab.active .tab-count{background:rgba(255,255,255,0.2)}
.tab:not(.active) .tab-count{background:var(--border)}

/* FORM */
.add-btn{width:100%;padding:15px;border-radius:16px;background:var(--dark);border:none;color:#fff;font-family:'Plus Jakarta Sans';font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;transition:all 0.2s}
.form-card{background:#fff;border-radius:20px;border:1px solid var(--border);padding:20px;margin-bottom:20px;display:none}
.form-card.open{display:block}
.form-title{font-family:'Plus Jakarta Sans';font-weight:800;font-size:16px;color:var(--dark);margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Inter';font-size:14px;color:var(--dark);background:var(--surface);outline:none;transition:all 0.18s;resize:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--dark);background:#fff}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:4px}
.btn-save{flex:1;padding:13px;border-radius:14px;background:var(--dark);border:none;color:#fff;font-family:'Plus Jakarta Sans';font-weight:800;font-size:13px;cursor:pointer}
.btn-cancel{padding:13px 18px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;cursor:pointer}

/* PROSPECT CARDS */
.prospects-list{display:flex;flex-direction:column;gap:10px}
.prospect-card{background:#fff;border-radius:18px;border:1px solid var(--border);padding:18px;box-shadow:0 2px 10px -4px rgba(27,28,28,0.05);transition:all 0.2s}
.prospect-card:hover{box-shadow:0 6px 20px -6px rgba(27,28,28,0.1)}
.prospect-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.prospect-name{font-family:'Plus Jakarta Sans';font-weight:800;font-size:15px;color:var(--dark);margin-bottom:2px}
.prospect-info{font-size:12px;color:var(--muted)}
.prospect-badge{padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.prospect-notes{font-size:12px;color:var(--muted);line-height:1.55;padding:10px 12px;background:var(--surface);border-radius:10px;margin-bottom:10px;font-style:italic}
.prospect-actions{display:flex;gap:8px;flex-wrap:wrap}
.action-btn{padding:7px 12px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--dark);display:flex;align-items:center;gap:5px;transition:all 0.15s}
.action-btn:hover{background:var(--surface)}
.action-btn.primary{background:var(--dark);color:#fff;border-color:var(--dark)}
.action-btn.danger{color:var(--red);border-color:rgba(181,35,48,0.2)}
.action-btn.success{color:var(--green);border-color:rgba(0,108,76,0.2)}
.empty{text-align:center;padding:48px 0;color:var(--muted)}
.empty .material-symbols-outlined{font-size:48px;display:block;margin:0 auto 12px;opacity:0.3}

/* STATUS COLORS */
.s-call{background:rgba(181,35,48,0.08);color:var(--red)}
.s-rdv{background:rgba(201,168,76,0.12);color:#9a7a28}
.s-prop{background:rgba(13,71,161,0.08);color:#0d47a1}
.s-signed{background:rgba(0,108,76,0.1);color:var(--green)}
.s-refus{background:rgba(90,64,63,0.08);color:var(--muted)}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-back"><span class="material-symbols-outlined" style="font-size:17px">arrow_back</span> Accueil</a>
  <a href="index.html" class="nav-logo">Stacker<div class="nav-logo-dot"></div></a>
</nav>
<div class="wrap">
  <div class="eyebrow"><span>Pipeline</span></div>
  <h1>Mes prospects</h1>
  <p class="subtitle">Suivi de tes contacts du premier appel à la signature.</p>

  <div class="status-tabs" id="statusTabs">
    <div class="tab active" onclick="filterTab('all')" id="tab-all">Tous <span class="tab-count" id="cnt-all">0</span></div>
    <div class="tab" onclick="filterTab('call')" id="tab-call">À appeler <span class="tab-count" id="cnt-call">0</span></div>
    <div class="tab" onclick="filterTab('rdv')" id="tab-rdv">RDV pris <span class="tab-count" id="cnt-rdv">0</span></div>
    <div class="tab" onclick="filterTab('prop')" id="tab-prop">Proposition <span class="tab-count" id="cnt-prop">0</span></div>
    <div class="tab" onclick="filterTab('signed')" id="tab-signed">Signés <span class="tab-count" id="cnt-signed">0</span></div>
    <div class="tab" onclick="filterTab('refus')" id="tab-refus">Refus <span class="tab-count" id="cnt-refus">0</span></div>
  </div>

  <button class="add-btn" onclick="toggleForm()">
    <span class="material-symbols-outlined" style="font-size:18px">person_add</span>
    Ajouter un prospect
  </button>

  <div class="form-card" id="prospectForm">
    <p class="form-title">Nouveau prospect</p>
    <div class="field-row">
      <div class="field"><label>Nom / Entreprise</label><input type="text" id="fName" placeholder="Ex: Café de la Paix"></div>
      <div class="field"><label>Téléphone</label><input type="tel" id="fPhone" placeholder="06 00 00 00 00"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Produit visé</label>
        <select id="fProduct">
          <option value="">Choisir...</option>
          <option>Carte Fidélité</option><option>E-Réputation Google</option>
          <option>Google My Business</option><option>Contenu Réseaux</option>
          <option>Site web Alma</option><option>Réduction Énergie</option>
          <option>Seoia SEO</option><option>Rachat de Crédit</option>
        </select>
      </div>
      <div class="field"><label>Statut initial</label>
        <select id="fStatus">
          <option value="call">À appeler</option>
          <option value="rdv">RDV pris</option>
          <option value="prop">Proposition envoyée</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Notes</label><textarea id="fNotes" rows="2" placeholder="Ex: Gérant sympa, rappeler mardi matin"></textarea></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="toggleForm()">Annuler</button>
      <button class="btn-save" onclick="saveProspect()">Ajouter</button>
    </div>
  </div>

  <div class="prospects-list" id="prospectsList"></div>
  <div class="empty" id="emptyState" style="display:none">
    <span class="material-symbols-outlined">contacts</span>
    <p>Aucun prospect dans cette catégorie.</p>
  </div>
</div>

<script>
const STATUS = {
  call:{label:'À appeler',cls:'s-call',icon:'call'},
  rdv:{label:'RDV pris',cls:'s-rdv',icon:'event'},
  prop:{label:'Proposition',cls:'s-prop',icon:'description'},
  signed:{label:'Signé',cls:'s-signed',icon:'handshake'},
  refus:{label:'Refus',cls:'s-refus',icon:'close'}
};
let prospects = JSON.parse(localStorage.getItem('stacker_pipeline') || '[]');
let activeTab = 'all';

function toggleForm(){ document.getElementById('prospectForm').classList.toggle('open'); }

function saveProspect(){
  const name = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const product = document.getElementById('fProduct').value;
  const status = document.getElementById('fStatus').value;
  const notes = document.getElementById('fNotes').value.trim();
  if(!name){ alert('Merci d\'entrer un nom.'); return; }
  prospects.unshift({id:Date.now(),name,phone,product,status,notes,date:new Date().toISOString()});
  localStorage.setItem('stacker_pipeline', JSON.stringify(prospects));
  document.getElementById('fName').value='';document.getElementById('fPhone').value='';
  document.getElementById('fProduct').value='';document.getElementById('fNotes').value='';
  toggleForm(); render();
}

function moveStatus(id, status){
  prospects = prospects.map(p => p.id===id ? {...p,status} : p);
  localStorage.setItem('stacker_pipeline', JSON.stringify(prospects));
  render();
}

function deleteProspect(id){
  if(!confirm('Supprimer ce prospect ?')) return;
  prospects = prospects.filter(p => p.id!==id);
  localStorage.setItem('stacker_pipeline', JSON.stringify(prospects));
  render();
}

function filterTab(tab){ activeTab=tab; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('tab-'+tab).classList.add('active'); render(); }

function render(){
  const counts = {all:prospects.length,call:0,rdv:0,prop:0,signed:0,refus:0};
  prospects.forEach(p => { if(counts[p.status]!==undefined) counts[p.status]++; });
  Object.keys(counts).forEach(k => { const el=document.getElementById('cnt-'+k); if(el) el.textContent=counts[k]; });
  const filtered = activeTab==='all' ? prospects : prospects.filter(p=>p.status===activeTab);
  document.getElementById('emptyState').style.display = filtered.length===0 ? 'block' : 'none';
  document.getElementById('prospectsList').innerHTML = filtered.map(p => {
    const s = STATUS[p.status];
    const date = new Date(p.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    const nextActions = {
      call:`<button class="action-btn primary" onclick="moveStatus(${p.id},'rdv')"><span class="material-symbols-outlined" style="font-size:13px">event</span>RDV pris</button>`,
      rdv:`<button class="action-btn primary" onclick="moveStatus(${p.id},'prop')"><span class="material-symbols-outlined" style="font-size:13px">description</span>Proposition</button>`,
      prop:`<button class="action-btn success" onclick="moveStatus(${p.id},'signed')"><span class="material-symbols-outlined" style="font-size:13px">handshake</span>Signé !</button>`,
      signed:'',refus:''
    };
    return `<div class="prospect-card">
      <div class="prospect-header">
        <div><p class="prospect-name">${p.name}</p><p class="prospect-info">${p.product||'Produit non défini'} · ${date}${p.phone ? ' · '+p.phone : ''}</p></div>
        <span class="prospect-badge ${s.cls}">${s.label}</span>
      </div>
      ${p.notes ? `<p class="prospect-notes">${p.notes}</p>` : ''}
      <div class="prospect-actions">
        ${nextActions[p.status]||''}
        ${p.status!=='signed'&&p.status!=='refus'?`<button class="action-btn danger" onclick="moveStatus(${p.id},'refus')"><span class="material-symbols-outlined" style="font-size:13px">close</span>Refus</button>`:''}
        <button class="action-btn" onclick="deleteProspect(${p.id})"><span class="material-symbols-outlined" style="font-size:13px">delete</span></button>
      </div>
    </div>`;
  }).join('');
}
render();
</script>
</body>
</html>
